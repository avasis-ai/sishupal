<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512" role="img" aria-label="Sishupal">
  <title>Sishupal</title>

  <!-- Background -->
  <rect width="512" height="512" fill="#000000"/>

  <!-- Outer ring (Ashoka Chakra inspired) -->
  <circle cx="256" cy="256" r="200" fill="none" stroke="#FF6B35" stroke-width="2" opacity="0.15"/>
  <circle cx="256" cy="256" r="180" fill="none" stroke="#FF6B35" stroke-width="1" opacity="0.1"/>

  <!-- 24 spokes -->
  <g stroke="#FF6B35" stroke-width="1" opacity="0.12">
    <line x1="256" y1="76" x2="256" y2="116"/>
    <line x1="256" y1="396" x2="256" y2="436"/>
    <line x1="76" y1="256" x2="116" y2="256"/>
    <line x1="396" y1="256" x2="436" y2="256"/>
    <line x1="128.7" y1="128.7" x2="157" y2="157"/>
    <line x1="355" y1="355" x2="383.3" y2="383.3"/>
    <line x1="383.3" y1="128.7" x2="355" y2="157"/>
    <line x1="157" y1="355" x2="128.7" y2="383.3"/>
    <line x1="100.5" y1="186" x2="138.3" y2="196.2"/>
    <line x1="373.7" y1="315.8" x2="411.5" y2="326"/>
    <line x1="186" y1="100.5" x2="196.2" y2="138.3"/>
    <line x1="315.8" y1="373.7" x2="326" y2="411.5"/>
    <line x1="411.5" y1="186" x2="373.7" y2="196.2"/>
    <line x1="138.3" y1="315.8" x2="100.5" y2="326"/>
    <line x1="326" y1="100.5" x2="315.8" y2="138.3"/>
    <line x1="196.2" y1="373.7" x2="186" y2="411.5"/>
    <line x1="100.5" y1="326" x2="138.3" y2="315.8"/>
    <line x1="373.7" y1="196.2" x2="411.5" y2="186"/>
    <line x1="326" y1="411.5" x2="315.8" y2="373.7"/>
    <line x1="196.2" y1="138.3" x2="186" y2="100.5"/>
    <line x1="186" y1="411.5" x2="196.2" y2="373.7"/>
    <line x1="315.8" y1="138.3" x2="326" y2="100.5"/>
    <line x1="411.5" y1="326" x2="373.7" y2="315.8"/>
    <line x1="138.3" y1="196.2" x2="100.5" y2="186"/>
  </g>

  <!-- Center core - the "S" monogram -->
  <!-- S path - stylized serpent / Devanagari inspired -->
  <path
    d="M 220 180 
       C 220 160, 260 140, 292 160 
       C 324 180, 324 210, 292 230 
       L 220 270 
       C 188 290, 188 320, 220 340 
       C 252 360, 292 340, 292 320"
    fill="none"
    stroke="#FF6B35"
    stroke-width="16"
    stroke-linecap="round"
    stroke-linejoin="round"/>

  <!-- Eye dot (the serpent's eye) -->
  <circle cx="268" cy="190" r="6" fill="#FF6B35"/>

  <!-- Accent glow behind S -->
  <circle cx="256" cy="256" r="80" fill="#FF6B35" opacity="0.04"/>

  <!-- Corner marks -->
  <g fill="#FF6B35" opacity="0.3">
    <rect x="24" y="24" width="16" height="2"/>
    <rect x="24" y="24" width="2" height="16"/>
    <rect x="472" y="24" width="16" height="2"/>
    <rect x="486" y="24" width="2" height="16"/>
    <rect x="24" y="486" width="16" height="2"/>
    <rect x="24" y="472" width="2" height="16"/>
    <rect x="472" y="486" width="16" height="2"/>
    <rect x="486" y="472" width="2" height="16"/>
  </g>

  <!-- India tricolor bottom bar -->
  <rect x="180" y="464" width="152" height="2" fill="#FF9933" opacity="0.5"/>
  <rect x="180" y="468" width="152" height="2" fill="#FFFFFF" opacity="0.3"/>
  <rect x="180" y="472" width="152" height="2" fill="#000080" opacity="0.5"/>
</svg>
